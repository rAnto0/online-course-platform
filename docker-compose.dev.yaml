services:
  postgres:
    ports:
      - "5432:5432"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    env_file:
      - ./microservices/auth/.env.dev
    volumes:
      - ./microservices/auth:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  course-service:
    env_file:
      - ./microservices/course/.env.dev
    volumes:
      - ./microservices/course:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  progress-service:
    env_file:
      - ./microservices/progress/.env.dev
    volumes:
      - ./microservices/progress:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  api-gateway:
    volumes:
      - ./api-gateway:/etc/krakend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://api-gateway:8080
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - frontend
    ports:
      - "3000:80"

  gateway-tests:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./api-gateway:/app
    environment:
      GATEWAY_BASE_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    command: bash -lc "pip install -r requirements.txt && pytest"
