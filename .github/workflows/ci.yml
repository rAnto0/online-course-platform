name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-conflict-check:
    name: Merge Conflict Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify merge with base branch
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
          git merge --no-commit --no-ff "origin/${{ github.event.pull_request.base.ref }}"

  backend-tests:
    name: Backend Tests (make test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files and JWT keys
        run: |
          make env-init
          make keys-init

      - name: Start required services
        run: |
          docker compose --env-file .env.dev -f docker-compose.yaml -f docker-compose.dev.yaml up -d postgres rabbitmq auth-service course-service

      - name: Wait for PostgreSQL
        run: |
          for i in {1..60}; do
            if docker compose --env-file .env.dev -f docker-compose.yaml -f docker-compose.dev.yaml exec -T postgres pg_isready -U postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run backend tests
        run: make test

      - name: Show containers status on failure
        if: failure()
        run: docker compose --env-file .env.dev -f docker-compose.yaml -f docker-compose.dev.yaml ps

      - name: Tear down
        if: always()
        run: docker compose --env-file .env.dev -f docker-compose.yaml -f docker-compose.dev.yaml down -v

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  docker-build-services:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: backend-tests
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - course
          - progress
          - assistant

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service image (cache)
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/${{ matrix.service }}
          push: false
          tags: local/${{ matrix.service }}-service:ci
          cache-from: type=gha,scope=${{ matrix.service }}-service
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-service

  docker-build-infra:
    name: Docker Build (infra/frontend)
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env files
        run: make env-init

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image (cache)
        uses: docker/build-push-action@v6
        with:
          context: ./infra/api-gateway
          push: false
          tags: local/api-gateway:ci
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build nginx image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/nginx/Dockerfile
          push: false
          tags: local/nginx:ci
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Build frontend image (cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: dev
          push: false
          tags: local/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
